walks:
  - slug: sodermalm
    title: ”Det var en afton i början av maj…”
    body: >
      <img src="img/katarina.jpg" alt="">
      Inledningen av succéromanen ”Röda Rummet” – ett målande  panorama över en älskad stad – är det mest kända av förfat tarens <strong class="event-name">Södermalm</strong>. Men här finns också Vita Bergen, Hornstull, Hornsgatan, Swedenborg och Bellman.
    dates:
      - date: "2018-07-17"
    time:
      value: "18:00"
      suffix: (–19:30)
    info:
      - Samling Mariatorget vid Swedenborgs staty.
  - slug: stora_landsvagen
    title: ”Jag är icke; blott vad jag gjort, det är!”
    body: >
      <img src="img/strindbergmonumentet.jpg" alt="">
      En vandring som följer Strindbergs sista färd 19 maj 1912 från hans bostad Drottninggatan 85 till graven på Norra kyrkogården <em>”icke i de rikas kvarter på fåfängans marknad”</em> och passerar första hustruns grav. En vandring också i försoningsdramat <strong class="event-name">Stora Landsvägen</strong>s texter.
    dates:
      - date: "2018-05-19"
        description: – Strindbergs begravningsdag. 14.00 (–16.00)
      - date: "2018-08-23"
        description: 18.00 (–20.00)
    time:
      value: "18:00"
      suffix: (–20:00)
    info:
      - Samling i Tegnérlunden vid Strindbergmonumentet.
  - slug: djurgarden
    title: ”...härd för myggor och spindlar”
    body: >
      <strong class="event-name">Djurgården</strong> är fylld av platser från Strindbergs liv och verk. Tidvis förlades boende, morgonpromenader och arbetsgömmen hit. Skådeplats för författarens kulturhistoriska gärningar och ”introduktion” i krogarnas nöjesliv.
    dates:
      - date: "2018-07-15"
    time:
      value: "14:00"
      suffix: (15:30)
    info:
      - Samling Djurgårdsbron/Strandvägen.
  - slug: morgonpromenad
    title: ”Morgonen har något med sig som ger ungdom i sinnet”
    body: >
      Vi vandrar Strindbergs <strong class="event-name">morgonpromenad</strong> – möter människor på Drottninggatans ”trottoar”, viker av ”i Fredsgatans halvdunkel” och vidare genom den händelserika Kungsträdgården och ”löpgraven”, Arsenalsgatan, fram till ”en nationell bildningsanstalt” och ”Stockholms ungkarlsklubb”.
    dates:
      - date: "2018-06-04"
      - date: "2018-08-18"
        description: (OBS! Biljett till Kulturfestivalen.)
    time:
      value: "07:00"
      suffix: (–08:30)
    info:
      - Samling i Tegnérlunden vid Strindbergsmonumentet.
  - slug: kungstradgarden
    title: ”Här... erbjuds det vackraste Stockholm har att visa...”
    body: >
      <strong class="event-name">Kungsträdgården</strong> – med utsikt mot Söder och omgiven av ett kulturliv med restauranger, teatrar och därtill bostäder – gav upphov till många avgörande händelser och möten i författarens liv.
    dates:
      - date: "2018-07-12"
    time:
      value: "18:00"
      suffix: (-19:30).
    info:
      - Samling Kungsträdgården vid Karl XII staty.
  - slug: gamla_stan
    title: ”I ett gammalt hus vid Riddarholmen...”
    body: >
      Författarens födelseplats i samma hus – nu rivet – som faderns arbetsplats. Här fanns simskola och ”Midsommar”s kaj för skutornas färd på Mälaren. I <strong class="event-name">Gamla Stan</strong> samlade han miljöer och personer till sitt framtida diktande.
    dates:
      - date: "2018-06-28"
      - date: "2018-08-09"
        description: (OBS! Biljett till Kulturfestivalen.)
    time:
      value: "18:00"
      suffix: (–19:30)
    info:
      - Samling Evert Taubes Terrass på Riddarholmen.
  - slug: teatertat_stad
    title: ”... vi råkas på något sätt, i Hvita Huset vid Nybroplan...”
    body: >
      Stockholm var under författarens tid en mycket <strong class="event-name">teatertät stad</strong>, där hans verk hade både jublande framgångar och kaotiska motgångar. Här var de omskrivna urpremiärerna. Här presenterades den intima scenen samtidigt som filmen tog sina första stapplande steg.
    dates:
      - date: "2018-08-02"
    time:
      value: "18:00"
      suffix: (–20:00).
    info:
      - Samling utanför Intima Teatern på Norra Bantorget.
  - slug: ostermalm
    title: ”Här rivs för att få luft och ljus”
    body: >
      <strong class="event-name">Östermalm</strong> beboddes av författaren många gånger. Här inträffade dramatiska händelser både i hans litteratur och liv. Här skapades bl a ”Ett Drömspel”, genomlevdes äktenskapet med Harriet Bosse och här blommade Beethoven-febern.
    dates:
      - date: "2018-07-26"
    time:
      value: "18:00"
      suffix: (–19:30).
    info:
      - Samling Strandvägen – hörnet av Grev Magnigatan.
  - slug: ingmar_bergman
    title: ”… det är tur att Strindberg finns. Vad skulle man annars ta sig till?”
    body: >
      <strong class="event-name">Ingmar Bergman</strong> påstår att ”om man lever i en Strindbergstradition, så andas man Strindbergsluft”. Detta manifesterades på många sätt tex hans Strindbergsuppsättningar på bl a Dramaten och hans bostad på Karlaplan.
      På denna vandring korsar Strindberg ibland Bergmans konst och liv från Dramaten till Karlaplan.
    dates:
      - date: "2018-08-16"
    time:
      value: "18:00"
      suffix: (–20:00).
    info:
      - Samling stora trappan framför Dramaten.
      - "Ciceroner: också TV-producenten och Bergman-kännaren Marie Nyreröd."
      - OBS! Biljetter Kulturfestivalen.
  - slug: kvarteren
    title: ”Ett Babels torn med allehanda folk”
    body: >
      1908 flyttade Strindberg till sin sista bostad i ”Blå Tornet”. <strong class="event-name">Kvarteren</strong> väckte minnen av familj och vänner, kyrko- och restaurangbesök och historieforskning. Vägen till den lilla intima scenen vid Norra Bantorget gav fröjder och bekymmer.
    dates:
      - date: "2018-08-20"
        description: (OBS! Biljett Kulturfestivalen)
    time:
      value: "12:00"
      suffix: (–12:30).
    info:
      - Samling utanför Strindbergs Intima Teater på Norra Bantorget.

excursions:
  - slug: kymendo
    title: ”O, du min grönskande ö, blomkorg i havets våg”
    body: >
      <img src="img/anita_kymmendo.jpg" alt="">
      Strindbergs sinnebild för skärgården kan välgrundat anses vara <strong class="event-name">Kymendö, Hemsö</strong>. Hit flydde han i fadersuppror för att skriva och odla och för att njuta av samvaron med sin första familj och vänner. Vandringen över ön går i ”Hemsöbornas” texter och hus i författarens liv.
    dates:
      - date: "2018-08-11"
    time:
      prefix: ca kl
      value: "10:45"
      suffix: "(–12:30), när båt från Stockholm och Saltsjöbaden anlänt. Kontrollera båttiderna!"
    info:
      - Samling Kymendös båtbrygga.
      - Medtag gärna matsäck!
  - slug: furusund
    title: ”...en vacker lövstrand med bryggor... små italienska villor”
    body: >
      <img src="img/anita_furusund.jpg" alt="">
      <strong>Furusund</strong> blev Strindbergs sista skärgårdsglädje, som satte många avtryck i hans litteratur. Här möter den legendariske skaparen av <strong class="event-name">Furusund</strong>, samlaren Christian Hammer. Från glödande optimism till djupaste vemod sommarlevde författaren i hyrda rum eller hus – ensam eller med familj, släkt och vänner.
    dates:
      - date: "2018-08-04"
    time:
      value: "14:00"
      suffix: (–16:00)
    info:
      - Samling vid ångbåtsbryggan i Furusund.
      - I samarbete med Furusunds kulturförening.
  - slug: dalaro
    title: ”Detta var hans landskap... fattiga knaggliga gråstensholmar med granskog...”
    body: >
      Författaren besökte <strong class="event-name">Dalarö</strong> tio somrar för att hyra i familj, bo på hotell, vara på genomresa eller för proviantering. Här börjar ”Hemsöborna”, sker mötet med sommarprästen, flyddes kärleken, uppvaktades kvinnor samt målades i olja.
    dates:
      - date: "2018-06-30"
    time:
      value: "15:00"
      suffix: (-17:00)
    info:
      - Samling framför Dalarös Tullhus.
  - slug: runmaro
    title: ”...allt under det jag rustar till en dikt om Silfverträsket...”
    body: >
      Strindberg återkom för några år 1889 till Sverige och tillbringar tre somrar på <strong class="event-name">Runmarö</strong>. Vistelserna präglades av skilsmässan från första hustrun och oron för barnen men också av experiment, fantasifulla teorier och arbetslust.
    dates:
      - date: "2018-07-07"
    time:
      prefix: Ca kl
      value: "09:30"
      suffix: (–16:00) när båt från Stavsnäs anlänt.
    info:
      - Anslutningsbuss från Slussen. Kontrollera tiderna!
      - Medtag matsäck!
      - I samarbete med Runmarö hembygdsförening.
