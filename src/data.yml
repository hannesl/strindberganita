walks:
  - slug: kungstradgarden
    title: ”Här... erbjuds det vackraste Stockholm har att visa...”
    body: >
      <strong class="event-name">Kungsträdgården</strong> – med utsikt mot Söder och omgiven av ett kulturliv med restauranger, teatrar och därtill bostäder – centrum för kulturlivet - gav upphov till många avgörande händelser och möten i författarens liv.
    dates:
      - date: "2026-07-11"
    time:
      value: "14:00"
      suffix: "(–15:30)"
    info:
      - Samling Kungsträdgården vid Karl XII staty.

  - slug: gamla_stan
    title: ”I ett gammalt hus vid Riddarholmen...”
    body: >
      Författarens födelseplats i samma hus – nu rivet – som faderns arbetsplats. Här fanns simskola och ”Midsommar”s kaj för skutornas färd på Mälaren. Här samlade han miljöer och personer till sitt framtida diktande. I <strong class="event-name">Gamla Stan</strong> övade han umgänge med skrivande och böcker och här utspelas flera ungdomsverk.
    dates:
      - date: "2026-07-25"
    time:
      value: "14:00"
      suffix: "(–15:30)"
    info:
      - Samling Evert Taubes Terrass på Riddarholmen.

  - slug: morgonpromenad
    title: ”Morgonen har något med sig som ger ungdom i sinnet”
    body: >
      Vi vandrar Strindbergs <strong class="event-name">morgonpromenad</strong> – möter människor på Drottninggatans ”trottoar”, viker av ”i Fredsgatans halvdunkel”, passerar begravningsprästen och vidare genom den händelserika Kungsträdgården och ”löpgraven”, Arsenalsgatan, fram till ”en nationell bildningsanstalt” och ”Stockholms ungkarlsklubb”.
    dates:
      - date: "2026-08-01"
    time:
      value: "07:00"
      suffix: "(–08:30)"
    info:
      - Samling i Tegnérlunden vid Strindbergsmonumentet.

  - slug: sodermalm
    title: ”Det var en afton i början av maj…”
    body: >
      <img src="img/katarina.jpg" alt="">
      Inledningen av succéromanen ”Röda Rummet” – ett målande panorama över en älskad stad – är det mest kända av författarens <strong class="event-name">Södermalm</strong>. Men här finns också Vita Bergen, Hornstull och Hornsgatan, som bjöd gästfrihet hos vänner och familj. Och här finns både Swedenborg och Bellman.
    dates:
      - date: "2026-08-08"
    time:
      value: "14:00"
      suffix: "(–15:30)"
    info:
      - Samling Mariatorget vid Swedenborgs staty.

  - slug: bergman
    title: ”... det är tur att Strindberg finns.”
    body: >
      <strong class="event-name">August Strindberg och Ingmar Bergman</strong>. Bergman påstår att "om man lever i en Strindbergstradition, så andas man Strindbergsluft". Detta manifesterades på många sätt t ex med hans Strindbergsuppsättningar på bl a Dramaten och hans bostad på Karlaplan. Denna vandring korsar Strindberg och Bergman i konst och i liv från Dramaten till Karlaplan.
    dates:
      - date: "2026-08-15"
    time:
      value: "14:00"
      suffix: "(–16:00)"
    info:
      - Samling stora trappan framför Dramaten.
      - Ciceroner också Bergman-kännaren Marie Nyreröd.

  - slug: strindbergsfejden
    title: ”När världen gjort bankrutt... då kanske!!”
    body: >
      Strindberg var mycket medveten om betydelsen av tidningsvärlden. Det var alltså logiskt att han vände sig till pressen, framförallt arbetarpressen som tog emot med öppna armar, när han skulle utkämpa sin sista strid – <strong class="event-name">Strindbergsfejden</strong>. Vandringen passerar författarens texter om religion, ekonomi, lagar, skola, försvar...
    dates:
      - date: "2026-08-22"
    time:
      value: "14:00"
      suffix: "(–15:30)"
    info:
      - Samling utanför Drottninggatan 83.

  - slug: stora_landsvagen
    title: ”Jag är icke; blott vad jag gjort, det är!”
    body: >
      En vandring som följer Strindbergs sista färd 19 maj 1912 från hans bostad Drottninggatan 85 till graven på Norra kyrkogården ”icke i de rikas kvarter på fåfängans marknad” och passerar första hustruns grav. En vandring också i försoningsdramat ”<strong class="event-name">Stora Landsvägen</strong>”s texter.
    dates:
      - date: "2026-08-29"
    time:
      value: "14:00"
      suffix: "(–16:30)"
    info:
      - Samling i Tegnérlunden vid Strindbergsmonumentet.

excursions:
  - slug: kymendo
    title: ”O, du min grönskande ö, blomkorg i havets våg”
    body: >
      <img src="img/anita_kymmendo.jpg" alt="">
      Strindbergs sinnebild för skärgården kan välgrundat anses vara <strong class="event-name">Kymendö, Hemsö</strong>. Hit flydde han i fadersuppror för att skriva och odla och för att njuta av samvaron med sin första familj och vänner. Vandringen över ön går i ”Hemsöbornas” texter och hus i författarens liv.
    dates:
      - date: "2026-06-27"
    time:
      prefix: ca kl
      value: "11:00"
      suffix: ", när båt från Stockholm och Saltsjöbaden anlänt."
    info:
      - Samling Kymendös båtbrygga.
      - Medtag gärna matsäck!
